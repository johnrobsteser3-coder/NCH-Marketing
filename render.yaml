services:
  - type: web
    name: nch-marketing
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    disk:
      name: nch-mlm-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_PATH
        value: /data/nch-mlm.db

